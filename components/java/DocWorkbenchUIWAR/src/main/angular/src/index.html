<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title></title>
  <base href="/">
  <link href="https://fonts.googleapis.com/css?family=Roboto" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

  <!--<script src="https://cdnjs.cloudflare.com/ajax/libs/web-animations/2.2.2/web-animations.min.js"></script>-->
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <meta http-equiv="X-UA-Compatible" content="IE=11">

  <style>
    body {
      background-color: #f1f1f1;
      font-family: "Roboto", sans-serif;
      margin: 0;
      padding: 0;
    }

    .pre-spa-loading {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 80vh;
    }

    .pre-spa-loading::after {
      content: "";
      animation: pre-spa-loading-animation 2s ease infinite;
    }

    @keyframes pre-spa-loading-animation {
      0% {
        content: '\00a0\00a0\00a0\00a0';
      }

      25% {
        content: '\00a0.\00a0\00a0';
      }

      50% {
        content: '\00a0..\00a0';
      }

      75% {
        content: '\00a0...';
      }

      100% {
        content: '\00a0\00a0\00a0\00a0';
      }
    }
  </style>
</head>

<body>
  <app-root>
    <div class="pre-spa-loading">Loading, please wait</div>
  </app-root>
  <!-- <script type="text/javascript" src="assets/js/browser.js"></script> -->
</body>

</html>
