	FROM EMAIL_OUTBOUND EML,QUEUE_NAME QN,DOCUMENT DOC \
	WHERE EML.TASK_STATUS_CDE = ? \
		AND EML.DOC_ID = DOC.DOC_ID \
		AND EML.TENANT_ID = DOC.TENANT_ID \
		AND EML.TENANT_ID = ? \
		AND EML.END_DTM IS NULL \
		AND DOC.END_DTM IS NULL \
		AND EML.TENANT_ID = QN.TENANT_ID \
