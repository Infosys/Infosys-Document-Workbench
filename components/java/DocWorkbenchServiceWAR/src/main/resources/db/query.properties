		SET ACCOUNT_ENABLED = ?,LAST_MOD_BY=? \
		FROM APP_USER AU2 WHERE AU1.APP_USER_ID = AU2.APP_USER_ID \
		AND AU1.APP_USER_ID = ? AND AU1.TENANT_ID=? RETURNING AU1.APP_USER_ID,AU2.ACCOUNT_ENABLED
