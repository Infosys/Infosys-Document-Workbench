getDocByAttr=select \
		distinct doc.*, tsv.task_status_txt, t3_attr.* \
	from  \
		document doc, task_status_val tsv, ( \
			select * from  \
			( \
				select \
					dar.doc_id, attr.attribute_id, attr.attr_name_cde, attrn.attr_name_txt, attr.attr_value, attr.extract_type_cde,  attr.confidence_pct \
				from  \
					attribute attr, attribute_name attrn, attachment_attr_rel aar, attachment atta, doc_attachment_rel dar \
				where \
					atta.attachment_id = dar.attachment_id \
					and aar.attachment_id = atta.attachment_id \
					and attrn.attr_name_cde = attr.attr_name_cde \
					and attr.attribute_id = aar.attribute_id \
					and attrn.tenant_id = attr.tenant_id \
					and attr.end_dtm IS NULL \
					and attrn.tenant_id = ? \
					and ( <<ATTR_FILTER_BY_SEARCH_CRITERIA>> ) \
			) t1_attachment_level \
			UNION  \
			select * from \
			( \
				select  \
					dar.doc_id, attr.attribute_id, attr.attr_name_cde, attrn.attr_name_txt, attr.attr_value, attr.extract_type_cde,  attr.confidence_pct \
				from  \
					attribute attr, attribute_name attrn, doc_attr_rel dar \
				where \
					dar.attribute_id = attr.attribute_id \
					and attrn.attr_name_cde = attr.attr_name_cde \
					and attrn.tenant_id = attr.tenant_id \
					and attr.end_dtm IS NULL \
					and attrn.tenant_id = ? \
					and ( <<ATTR_FILTER_BY_SEARCH_CRITERIA>> ) \
			) t2_case_level \
		) t3_attr \
	where tsv.task_status_cde = doc.task_status_cde and doc.doc_id = t3_attr.doc_id