			          EVENT_TYPE_CDE,DOC_ID,CREATE_BY,TENANT_ID,EVENT_DTM) \
			          VALUES (?,?,?,?,CURRENT_TIMESTAMP)
getActionParamMapping=( \
					    SELECT \
					        'DOCUMENT' ENTITY, \
					        MAPNG.*, \
					        DOC_ATTRS.ATTR_VALUE \
					    FROM \
					        ( \
					            SELECT \
					                ACTVAL.ACTION_NAME_CDE, \
					                ACTVAL.ACTION_NAME_TXT, \
					                PARAMVAL.PARAM_NAME_CDE, \
					                PARAMVAL.PARAM_NAME_TXT, \
					                ATTRVAL.ATTR_NAME_CDE, \
					                ATTRVAL.ATTR_NAME_TXT ATTRVAL_ATTR_NAME_TXT, \
					                APAM.ATTR_NAME_TXT APAM_ATTR_NAME_TXT \
					            FROM \
					                ACTION_PARAM_ATTR_MAPPING APAM \
					                RIGHT OUTER JOIN ACTION_NAME ACTVAL on ACTVAL.ACTION_NAME_CDE = APAM.ACTION_NAME_CDE \
					                LEFT OUTER JOIN ATTRIBUTE_NAME ATTRVAL on ATTRVAL.ATTR_NAME_CDE = APAM.ATTR_NAME_CDE \
					                LEFT OUTER JOIN PARAM_NAME PARAMVAL on PARAMVAL.PARAM_NAME_CDE = APAM.PARAM_NAME_CDE \
					            WHERE \
					                ACTVAL.ACTION_NAME_CDE = ? \
					                AND ( \
					                    ATTRVAL.TENANT_ID IS NULL \
					                    OR ATTRVAL.TENANT_ID = ACTVAL.TENANT_ID \
					                ) \
					                AND ( \
					                    PARAMVAL.TENANT_ID IS NULL \
					                    OR PARAMVAL.TENANT_ID = ACTVAL.TENANT_ID \
					                ) \
					                AND ( \
					                    APAM.TENANT_ID IS NULL \
					                    OR APAM.TENANT_ID = ACTVAL.TENANT_ID \
					                ) \
					                AND ACTVAL.TENANT_ID = ? \
					        ) MAPNG \
					        JOIN ( \
					            SELECT \
					                ATTR.attribute_id, \
					                ATTR.attr_name_cde, \
					                ATTR.attr_value \
					            FROM \
					                attribute ATTR, \
					                doc_attr_rel DAR \
					            WHERE \
					                ATTR.attribute_id = DAR.attribute_id \
					                AND DAR.doc_id = ? \
					                AND DAR.END_DTM IS NULL \
					                AND ATTR.END_DTM IS NULL \
					                AND DAR.TENANT_ID = ? \
					        ) DOC_ATTRS ON DOC_ATTRS.ATTR_NAME_CDE = MAPNG.ATTR_NAME_CDE \
					    ORDER BY \
					        MAPNG.ACTION_NAME_CDE, \
					        MAPNG.PARAM_NAME_CDE, \
					        MAPNG.ATTR_NAME_CDE \
					) \
					UNION \
					( \
					    SELECT \
					        'ATTACHMENT' ENTITY, \
					        MAPNG.*, \
					        ATTACH_ATTRS.ATTR_VALUE \
					    FROM \
					        ( \
					            SELECT \
					                ACTVAL.ACTION_NAME_CDE, \
					                ACTVAL.ACTION_NAME_TXT, \
					                PARAMVAL.PARAM_NAME_CDE, \
					                PARAMVAL.PARAM_NAME_TXT, \
					                ATTRVAL.ATTR_NAME_CDE, \
					                ATTRVAL.ATTR_NAME_TXT ATTRVAL_ATTR_NAME_TXT, \
					                APAM.ATTR_NAME_TXT APAM_ATTR_NAME_TXT \
					            FROM \
					                ACTION_PARAM_ATTR_MAPPING APAM \
					                RIGHT OUTER JOIN ACTION_NAME ACTVAL on ACTVAL.ACTION_NAME_CDE = APAM.ACTION_NAME_CDE \
					                LEFT OUTER JOIN ATTRIBUTE_NAME ATTRVAL on ATTRVAL.ATTR_NAME_CDE = APAM.ATTR_NAME_CDE \
					                LEFT OUTER JOIN PARAM_NAME PARAMVAL on PARAMVAL.PARAM_NAME_CDE = APAM.PARAM_NAME_CDE \
					            WHERE \
					                ACTVAL.ACTION_NAME_CDE = ? \
					                AND ( \
					                    ATTRVAL.TENANT_ID IS NULL \
					                    OR ATTRVAL.TENANT_ID = ACTVAL.TENANT_ID \
					                ) \
					                AND ( \
					                    PARAMVAL.TENANT_ID IS NULL \
					                    OR PARAMVAL.TENANT_ID = ACTVAL.TENANT_ID \
					                ) \
					                AND ( \
					                    APAM.TENANT_ID IS NULL \
					                    OR APAM.TENANT_ID = ACTVAL.TENANT_ID \
					                ) \
					                AND ACTVAL.TENANT_ID = ? \
					        ) MAPNG \
					        JOIN ( \
					            SELECT \
					                ATTR.attribute_id, \
					                ATTR.attr_name_cde, \
					                ATTR.attr_value \
					            FROM \
					                attribute ATTR, \
					                attachment_attr_rel AAR, \
					                doc_attachment_rel DAR \
					            WHERE \
					                ATTR.attribute_id = AAR.attribute_id \
					                AND AAR.attachment_id = DAR.attachment_id \
					                AND DAR.doc_id = ? \
					                AND AAR.END_DTM IS NULL \
					                AND ATTR.END_DTM IS NULL \
					                AND DAR.TENANT_ID = ? \
					        ) ATTACH_ATTRS ON ATTACH_ATTRS.ATTR_NAME_CDE = MAPNG.ATTR_NAME_CDE \
					    ORDER BY \
					        MAPNG.ACTION_NAME_CDE, \
					        MAPNG.PARAM_NAME_CDE, \
					        MAPNG.ATTR_NAME_CDE \
					)
