getUserQueueRelationship=SELECT USER_QUEUE_DATA.*, \
	CASE WHEN USER_QUEUE_DATA.QUEUE_CLOSED_DTM > CURRENT_TIMESTAMP THEN 'SCHEDULED' \
		 WHEN USER_QUEUE_DATA.QUEUE_CLOSED_DTM < CURRENT_TIMESTAMP THEN 'CLOSED' \
		 ELSE 'OPEN' \
	END AS QUEUE_STATUS \
	FROM (SELECT AUQR.QUEUE_NAME_CDE, \
		QN.QUEUE_NAME_TXT, \
		QN.DOC_TYPE_CDE, \
		DT.DOC_TYPE_TXT, \
		AUQR.APP_USER_QUEUE_REL_ID, \
		AUQR.HIDE_AFTER_DTM AS USER_QUEUE_HIDE_AFTER_DTM, \
		QN.END_DTM AS QUEUE_CLOSED_DTM, \
		QN.HIDE_AFTER_DTM AS QUEUE_HIDE_AFTER_DTM \
	FROM APP_USER_QUEUE_REL AUQR, \
		QUEUE_NAME QN, \
		DOCUMENT_TYPE_VAL DT \
	WHERE AUQR.QUEUE_NAME_CDE = QN.QUEUE_NAME_CDE \
		AND QN.DOC_TYPE_CDE = DT.DOC_TYPE_CDE \
		AND AUQR.TENANT_ID = QN.TENANT_ID \
		AND AUQR.END_DTM IS NULL \
		AND (AUQR.HIDE_AFTER_DTM IS NULL OR AUQR.HIDE_AFTER_DTM > CURRENT_TIMESTAMP) \
		AND (QN.END_DTM IS NULL \
			 OR QN.END_DTM > CURRENT_TIMESTAMP \
			 OR (QN.END_DTM <= CURRENT_TIMESTAMP AND AUQR.HIDE_AFTER_DTM > CURRENT_TIMESTAMP) ) \
		AND AUQR.APP_USER_ID = ? \
		AND AUQR.TENANT_ID = ? \
	ORDER BY AUQR.QUEUE_NAME_CDE )USER_QUEUE_DATA
