getAttachmentAttributesWithOrigVal=SELECT AATR.ATTACHMENT_ID as ATTACHMENT_ID ,DAR.DOC_ID,AATR.ATTACHMENT_ATTR_REL_ID,ATTR.ATTR_NAME_CDE,ANV.ATTR_NAME_TXT as ATTR_NAME_TXT, \
		ATTR.ATTR_VALUE as ATTR_VALUE,ATTR.EXTRACT_TYPE_CDE,ATTR.CONFIDENCE_PCT, ATTR.CREATE_BY, ATTR.CREATE_DTM as CREATE_DTM, ATTR.LAST_MOD_BY, ATTR.LAST_MOD_DTM \
		FROM ATTACHMENT_ATTR_REL AATR,ATTRIBUTE ATTR,ATTRIBUTE_NAME ANV,DOC_ATTACHMENT_REL DAR WHERE DAR.DOC_ID = ? AND AATR.ATTACHMENT_ID = DAR.ATTACHMENT_ID AND \
		ATTR.ATTR_NAME_CDE=ANV.ATTR_NAME_CDE AND AATR.ATTRIBUTE_ID=ATTR.ATTRIBUTE_ID  AND AATR.TENANT_ID=ANV.TENANT_ID \
		AND AATR.TENANT_ID=ATTR.TENANT_ID AND AATR.TENANT_ID = ? AND (ANV.ATTR_NAME_TXT,ATTR.CREATE_DTM) in \
		(SELECT a.ATTR_NAME_TXT ,MIN(a.CREATE_DTM) FROM \
		(SELECT AATR.ATTACHMENT_ID as ATTACHMENT_ID ,DAR.DOC_ID,AATR.ATTACHMENT_ATTR_REL_ID,ATTR.ATTR_NAME_CDE,ANV.ATTR_NAME_TXT as ATTR_NAME_TXT, \
		ATTR.ATTR_VALUE,ATTR.EXTRACT_TYPE_CDE,ATTR.CONFIDENCE_PCT, ATTR.CREATE_BY, ATTR.CREATE_DTM as CREATE_DTM, ATTR.LAST_MOD_BY, ATTR.LAST_MOD_DTM \
		FROM ATTACHMENT_ATTR_REL AATR,ATTRIBUTE ATTR,ATTRIBUTE_NAME ANV,DOC_ATTACHMENT_REL DAR \
		WHERE DAR.DOC_ID = ? AND AATR.ATTACHMENT_ID = DAR.ATTACHMENT_ID AND ATTR.ATTR_NAME_CDE=ANV.ATTR_NAME_CDE AND AATR.ATTRIBUTE_ID=ATTR.ATTRIBUTE_ID  AND AATR.TENANT_ID=ANV.TENANT_ID \
		AND AATR.TENANT_ID=ATTR.TENANT_ID AND AATR.TENANT_ID = ? ORDER BY AATR.CREATE_DTM) as a group by a.ATTR_NAME_TXT)ORDER BY ATTR.CREATE_DTM
