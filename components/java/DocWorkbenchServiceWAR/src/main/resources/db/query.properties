addEmail=INSERT INTO EMAIL_OUTBOUND(\
         EMAIL_BODY_HTML, DOC_ID,EMAIL_TO,EMAIL_SUBJECT,CREATE_BY,TASK_STATUS_CDE,EMAIL_CC,EMAIL_BCC,TENANT_ID) \
         VALUES (?,?,?,?,?,?,?,?,?) RETURNING EMAIL_OUTBOUND_ID
getOutboundEmail=SELECT \
		    EO.DOC_ID, \
		    EO.EMAIL_OUTBOUND_ID, \
		    EO.EMAIL_TO, \
		    EO.EMAIL_SUBJECT, \
		    EO.EMAIL_BODY_TEXT, \
		    EO.EMAIL_SENT_DTM, \
		    EO.TASK_STATUS_CDE, \
		    EO.EMAIL_CC, \
		    EO.EMAIL_BCC, \
		    EO.EMAIL_BODY_HTML, \
		    EO.CREATE_BY CREATE_BY_USER_LOGIN_ID, \
		    AU.USER_FULL_NAME CREATE_BY_USER_FULL_NAME, \
		    AU.USER_TYPE_CDE CREATE_BY_USER_TYPE_CDE, \
		    UTV.USER_TYPE_TXT CREATE_BY_USER_TYPE_TXT \
		FROM \
		    EMAIL_OUTBOUND EO, \
		    APP_USER AU, \
		    USER_TYPE_VAL UTV \
		WHERE \
		    DOC_ID = ? \
		    AND AU.USER_LOGIN_ID = EO.CREATE_BY \
		    AND UTV.USER_TYPE_CDE = AU.USER_TYPE_CDE \
		    AND AU.TENANT_ID = EO.TENANT_ID  \
		    AND EO.TASK_STATUS_CDE > 50 \
		    AND EO.TENANT_ID = ? \
		ORDER BY \
		    EO.EMAIL_OUTBOUND_ID
