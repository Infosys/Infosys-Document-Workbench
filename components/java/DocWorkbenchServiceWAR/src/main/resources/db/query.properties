			DOC_ATTACHMENT_REL \
			JOIN  ATTACHMENT ON DOC_ATTACHMENT_REL.ATTACHMENT_ID = ATTACHMENT.ATTACHMENT_ID \
		GROUP BY \
			DOC_ATTACHMENT_REL.DOC_ID, \
			IS_INLINE_IMAGE \
		HAVING \
			IS_INLINE_IMAGE = 'false' \
	) ATT ON DOC.DOC_ID = ATT.DOC_ID \
LEFT OUTER JOIN \
	(SELECT DATR.DOC_ID,ATTR.ATTR_NAME_CDE, \
			DATR.DOC_ATTR_REL_ID, \
			ANV.ATTR_NAME_TXT, \
			ATTR.ATTR_VALUE, \
