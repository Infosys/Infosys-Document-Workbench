			  VALUES(?,?,?,?,?,?,?) 
getActionTask=	SELECT * \
	FROM \
		(SELECT * \
			FROM \
				(SELECT DAREL.DOC_ACTION_REL_ID, \
						DAREL.DOC_ID, \
						DAREL.ACTION_NAME_CDE, \
						ANVAL.ACTION_NAME_TXT, \
						DAREL.TASK_STATUS_CDE, \
						TSVAL.TASK_STATUS_TXT, \
						DAREL.TASK_TYPE_CDE, \
						DAREL.ACTION_RESULT, \
						DAREL.SNAP_SHOT, \
						DOC.QUEUE_NAME_CDE, \
						DAREL.CREATE_BY CREATE_BY_USER_LOGIN_ID, \
						AU.USER_FULL_NAME CREATE_BY_USER_FULL_NAME, \
						AU.USER_TYPE_CDE CREATE_BY_USER_TYPE_CDE, \
						UTV.USER_TYPE_TXT CREATE_BY_USER_TYPE_TXT, \
						DAREL.CREATE_DTM, \
						DAREL.LAST_MOD_DTM \
					FROM DOC_ACTION_REL DAREL, \
						ACTION_NAME ANVAL, \
						TASK_STATUS_VAL TSVAL, \
						APP_USER AU, \
						USER_TYPE_VAL UTV, \
						DOCUMENT DOC, \
						QUEUE_NAME QN \
					WHERE DOC.DOC_ID = DAREL.DOC_ID \
						AND ANVAL.ACTION_NAME_CDE = DAREL.ACTION_NAME_CDE \
						AND AU.USER_LOGIN_ID = DAREL.CREATE_BY \
						AND UTV.USER_TYPE_CDE = AU.USER_TYPE_CDE \
						AND AU.TENANT_ID = DAREL.TENANT_ID \
						AND DOC.TENANT_ID = DAREL.TENANT_ID \
						AND DOC.TENANT_ID = ANVAL.TENANT_ID \
						AND DOC.TENANT_ID = ? \
						AND DAREL.END_DTM IS NULL \
						AND DOC.END_DTM IS NULL \
						AND TSVAL.TASK_STATUS_CDE = DAREL.TASK_STATUS_CDE \
						AND DOC.TENANT_ID = QN.TENANT_ID \
						AND DOC.QUEUE_NAME_CDE = QN.QUEUE_NAME_CDE \
						AND (QN.END_DTM IS NULL \
							 OR QN.END_DTM > CURRENT_TIMESTAMP ) \
				) TABLE1 \
			LEFT OUTER JOIN \
				(SELECT APAREL.DOC_ACTION_REL_ID DOC_ACTION_REL_ID2, \
						APAREL.ACTION_PARAM_ATTR_REL_ID, \
						APAREL.PARAM_NAME_CDE, \
						PNVAL.PARAM_NAME_TXT, \
						APAREL.PARAM_VALUE \
					FROM ACTION_PARAM_ATTR_REL APAREL, \
						PARAM_NAME PNVAL \
					WHERE PNVAL.PARAM_NAME_CDE = APAREL.PARAM_NAME_CDE \
						AND APAREL.TENANT_ID = PNVAL.TENANT_ID \
						AND APAREL.TENANT_ID = ? \
				) TABLE2 ON TABLE1.DOC_ACTION_REL_ID = TABLE2.DOC_ACTION_REL_ID2 \
			ORDER BY DOC_ACTION_REL_ID) ALL_DATA
updateActionTask=UPDATE DOC_ACTION_REL DAR1 \
		SET {COLUMN_TXT} , LAST_MOD_BY=? \
		FROM DOC_ACTION_REL DAR2,TASK_STATUS_VAL TSV WHERE DAR1.DOC_ACTION_REL_ID = DAR2.DOC_ACTION_REL_ID AND DAR2.TASK_STATUS_CDE=TSV.TASK_STATUS_CDE \
		AND DAR1.DOC_ACTION_REL_ID = ? AND DAR1.TENANT_ID=? RETURNING DAR1.DOC_ACTION_REL_ID,DAR2.TASK_STATUS_CDE,TSV.TASK_STATUS_TXT,DAR2.ACTION_RESULT,DAR2.SNAP_SHOT
deleteActionDoc=UPDATE DOC_ACTION_REL SET END_DTM=CURRENT_TIMESTAMP, LAST_MOD_BY=? WHERE END_DTM IS NULL AND DOC_ACTION_REL_ID=? AND TENANT_ID = ?
deleteActionParamAttrRel=UPDATE ACTION_PARAM_ATTR_REL SET END_DTM=CURRENT_TIMESTAMP, LAST_MOD_BY=? WHERE END_DTM IS NULL AND DOC_ACTION_REL_ID=? AND TENANT_ID = ?
getUserDetails=SELECT USR.APP_USER_ID, USR.USER_LOGIN_ID, USR.USER_PASSWORD, USR.USER_EMAIL, USR.TENANT_ID, \
	USR.USER_FULL_NAME, USR.USER_TYPE_CDE, UTV.USER_TYPE_TXT, USR.ACCESS_TOKEN, USR.ACCOUNT_NON_LOCKED, \
	USR.ACCOUNT_NON_EXPIRED, USR.CREDENTIALS_NON_EXPIRED,USR.ACCOUNT_ENABLED, REL_VAL.ROLE_TYPE_TXT,REL_VAL.ROLE_TYPE_CDE \
	FROM APP_USER USR LEFT OUTER JOIN (SELECT USRROREL.APP_USER_ID, USRROREL.TENANT_ID, ROVAL.ROLE_TYPE_TXT, \
	ROVAL.ROLE_TYPE_CDE,USRROREL.END_DTM FROM APP_USER_ROLE_REL USRROREL,ROLE_TYPE_VAL ROVAL WHERE USRROREL.ROLE_TYPE_CDE=ROVAL.ROLE_TYPE_CDE) \
	REL_VAL ON (USR.APP_USER_ID = REL_VAL.APP_USER_ID AND REL_VAL.TENANT_ID = USR.TENANT_ID), USER_TYPE_VAL UTV  WHERE LOWER(USR.USER_LOGIN_ID) = LOWER(?) \
	AND USR.TENANT_ID=? AND REL_VAL.END_DTM IS NULL AND UTV.USER_TYPE_CDE = USR.USER_TYPE_CDE
getUserRoleRelationship=SELECT AU.APP_USER_ID, AU.USER_FULL_NAME,AU.USER_EMAIL,AU.USER_LOGIN_ID,UT.USER_TYPE_TXT,UT.USER_TYPE_CDE,AU.ACCOUNT_ENABLED, \
		RT.ROLE_TYPE_TXT,RT.ROLE_TYPE_CDE FROM APP_USER AU LEFT OUTER JOIN USER_TYPE_VAL UT ON AU.USER_TYPE_CDE=UT.USER_TYPE_CDE \
		LEFT OUTER JOIN APP_USER_ROLE_REL AURR ON AU.APP_USER_ID=AURR.APP_USER_ID AND AURR.END_DTM IS NULL AND \
		AURR.TENANT_ID=AU.TENANT_ID LEFT OUTER JOIN ROLE_TYPE_VAL RT ON AURR.ROLE_TYPE_CDE=RT.ROLE_TYPE_CDE \
		WHERE AU.TENANT_ID=? ORDER BY AU.APP_USER_ID, AU.USER_LOGIN_ID,RT.ROLE_TYPE_TXT ASC
