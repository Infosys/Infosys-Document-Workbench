		FROM DOC_ATTR_REL DATR, \
			ATTRIBUTE_NAME ANV, \
			EXTRACT_TYPE_VAL ETV, \
			ATTRIBUTE ATTR \
		WHERE ANV.ATTR_NAME_CDE = ATTR.ATTR_NAME_CDE \
		<<ATTRFILTER>> \
			AND DATR.ATTRIBUTE_ID = ATTR.ATTRIBUTE_ID \
			AND DATR.TENANT_ID = ATTR.TENANT_ID \
			AND ANV.TENANT_ID = DATR.TENANT_ID \
			AND ATTR.EXTRACT_TYPE_CDE = ETV.EXTRACT_TYPE_CDE \
			AND DATR.END_DTM IS NULL \
			AND ATTR.END_DTM IS NULL ) ATTRIB ON DOC.DOC_ID = ATTRIB.DOC_ID, \
			TASK_STATUS_VAL TSV, \
			LOCK_STATUS_VAL LSV \
		WHERE \
		TSV.TASK_STATUS_CDE = DOC.TASK_STATUS_CDE \
		AND LSV.LOCK_STATUS_CDE = DOC.LOCK_STATUS_CDE \	
getTotalCountOnFilter=SELECT \
    COUNT(*) \
	FROM \
    ( \
        SELECT \
            DOC.DOC_ID, \
            LOCK_STATUS_CDE, \
            TASK_STATUS_CDE, \
            <HIGHEST-EVENT-BLOCK-BEGIN> \
            EVEH.HIGHEST_EVENT_TYPE_CDE, \
            <HIGHEST-EVENT-BLOCK-END> \
            <LATEST-EVENT-BLOCK-BEGIN> \
            EVEL2.LATEST_EVENT_TYPE_CDE, \
            EVEL.EVENT_DTM, \
            <LATEST-EVENT-BLOCK-END> \
            APU.APP_USER_ID, \
            APU.USER_LOGIN_ID ASSIGNED_TO, \
            CASE_REVIEW.CASE_REVIEWER_ID, \
			CASE_REVIEW.CASE_REVIEWER \
        FROM \
            DOCUMENT DOC \
            <LATEST-EVENT-BLOCK-BEGIN> \
            LEFT JOIN ( \
                SELECT \
                    DOC_ID, \
                    MAX(EVENT_DTM) EVENT_DTM \
                FROM \
                    DOC_EVENT_REL \
                GROUP BY \
                	DOC_ID \
            ) EVEL ON (DOC.DOC_ID = EVEL.DOC_ID) \
            LEFT JOIN ( \
            	SELECT \
                    DOC_ID, \
                    EVENT_DTM, \
                    EVENT_TYPE_CDE   LATEST_EVENT_TYPE_CDE \
                FROM DOC_EVENT_REL \
            ) EVEL2 ON (EVEL2.DOC_ID = EVEL.DOC_ID AND EVEL2.EVENT_DTM = EVEL.EVENT_DTM) \
            <LATEST-EVENT-BLOCK-END> \
            <HIGHEST-EVENT-BLOCK-BEGIN> \
            LEFT JOIN ( \
                SELECT \
                    DOC_ID, \
                    MAX(EVENT_TYPE_CDE) HIGHEST_EVENT_TYPE_CDE \
                FROM \
                    DOC_EVENT_REL \
                GROUP BY \
                    DOC_ID \
            ) EVEH ON (DOC.DOC_ID = EVEH.DOC_ID) \
            <HIGHEST-EVENT-BLOCK-END> \
            LEFT JOIN ( \
                SELECT \
                    ADUR.DOC_ID, \
                    AU.APP_USER_ID, \
                    AU.USER_LOGIN_ID \
                FROM \
                    DOC_APP_USER_REL ADUR \
                    JOIN  APP_USER AU ON ADUR.APP_USER_ID = AU.APP_USER_ID \
                WHERE \
                    ADUR.END_DTM IS NULL \
                    AND ADUR.DOC_ROLE_TYPE_CDE = 1\
            ) APU ON (DOC.DOC_ID = APU.DOC_ID) \
            LEFT JOIN( \
	            SELECT ADUR.DOC_ID, \
	            	AU.APP_USER_ID CASE_REVIEWER_ID, \
	            	AU.USER_LOGIN_ID CASE_REVIEWER \
				FROM \
					DOC_APP_USER_REL ADUR \
					JOIN APP_USER AU ON ADUR.APP_USER_ID = AU.APP_USER_ID \
				WHERE \
					ADUR.END_DTM IS NULL \
					AND ADUR.DOC_ROLE_TYPE_CDE = 2 )CASE_REVIEW ON (DOC.DOC_ID = CASE_REVIEW.DOC_ID) \
        WHERE \
            DOC.QUEUE_NAME_CDE = ? \
            AND DOC.END_DTM IS NULL \
            AND DOC.TENANT_ID = ? \
    ) DOC_DATA
getDocUserDetails=SELECT \
		DAUR.DOC_ID, \
		USR.APP_USER_ID, \
		USR.USER_LOGIN_ID, \
		USR.USER_EMAIL, \
		USR.USER_FULL_NAME, \
		RTV.ROLE_TYPE_CDE, \
		RTV.ROLE_TYPE_TXT, \
		DRTV.DOC_ROLE_TYPE_CDE, \
	 	DRTV.DOC_ROLE_TYPE_TXT, \
		USR.USER_TYPE_CDE, \
		UTV.USER_TYPE_TXT \
	FROM \
		DOC_APP_USER_REL DAUR, \
		DOC_ROLE_TYPE_VAL DRTV, \
		APP_USER USR, \
		APP_USER_ROLE_REL AURR, \
		ROLE_TYPE_VAL RTV, \
		USER_TYPE_VAL UTV \
	WHERE \
		UTV.USER_TYPE_CDE = USR.USER_TYPE_CDE \
		AND AURR.ROLE_TYPE_CDE = RTV.ROLE_TYPE_CDE \
		AND AURR.TENANT_ID = USR.TENANT_ID \
		AND AURR.END_DTM IS NULL \
		AND DAUR.TENANT_ID = USR.TENANT_ID \
		AND DAUR.APP_USER_ID = USR.APP_USER_ID \
		AND DAUR.APP_USER_ID = AURR.APP_USER_ID \
		AND DAUR.DOC_ROLE_TYPE_CDE = DRTV.DOC_ROLE_TYPE_CDE \
		AND DAUR.END_DTM IS NULL \
		AND DAUR.TENANT_ID = ? \
	 	AND DAUR.DOC_ID = ?
#### Search related queries end ####         
getTeammatesDetails=SELECT AU.USER_EMAIL,AU.USER_FULL_NAME,AU.APP_USER_ID , \
	AU.USER_LOGIN_ID ,AU.USER_TYPE_CDE,UTV.USER_TYPE_TXT,AURR.ROLE_TYPE_CDE, \
	RTV.ROLE_TYPE_TXT,CQL.QUEUE_NAME_CDE,CQL.QUEUE_NAME_TXT,CQL.DOC_TYPE_CDE,CQL.DOC_TYPE_TXT \
	FROM APP_USER AU,USER_TYPE_VAL UTV,APP_USER_ROLE_REL AURR,ROLE_TYPE_VAL RTV, \
	(SELECT AUQR.QUEUE_NAME_CDE,QN.QUEUE_NAME_TXT,QN.DOC_TYPE_CDE, \
		DT.DOC_TYPE_TXT,AUQR.APP_USER_QUEUE_REL_ID,AUQR.APP_USER_ID \
	FROM APP_USER_QUEUE_REL AUQR,QUEUE_NAME QN,DOCUMENT_TYPE_VAL DT \
	WHERE AUQR.QUEUE_NAME_CDE = QN.QUEUE_NAME_CDE AND QN.DOC_TYPE_CDE = DT.DOC_TYPE_CDE \
		AND AUQR.TENANT_ID = QN.TENANT_ID AND AUQR.END_DTM IS NULL \
		AND AUQR.QUEUE_NAME_CDE IN ((SELECT QUEUE_NAME_CDE \
						FROM APP_USER_QUEUE_REL	WHERE APP_USER_ID = ? AND TENANT_ID =? \
					AND END_DTM IS NULL)) AND AUQR.APP_USER_ID<> ? AND AUQR.TENANT_ID = ? \
	ORDER BY AUQR.QUEUE_NAME_CDE) CQL  WHERE AU.APP_USER_ID=CQL.APP_USER_ID \
	AND UTV.USER_TYPE_CDE=AU.USER_TYPE_CDE \
	AND AURR.APP_USER_ID=AU.APP_USER_ID \
	AND AURR.ROLE_TYPE_CDE=RTV.ROLE_TYPE_CDE AND AURR.END_DTM IS NULL \
	ORDER BY AU.USER_LOGIN_ID,RTV.ROLE_TYPE_TXT ASC
