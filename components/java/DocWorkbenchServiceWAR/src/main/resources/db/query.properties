sqGetDocOnFilterV3=SELECT \
    * \
FROM \
    ( \
        SELECT \
            DOC.*, \
            <HIGHEST-EVENT-BLOCK-BEGIN> \
            EVEH.HIGHEST_EVENT_TYPE_CDE, \
            <HIGHEST-EVENT-BLOCK-END> \
            <LATEST-EVENT-BLOCK-BEGIN> \
            EVEL2.LATEST_EVENT_TYPE_CDE, \
            EVEL.EVENT_DTM, \
            <LATEST-EVENT-BLOCK-END> \
            APU.APP_USER_ID, \
            APU.USER_LOGIN_ID ASSIGNED_TO, \
            CASE_REVIEW.CASE_REVIEWER_ID, \
            CASE_REVIEW.CASE_REVIEWER \
            <<SORTBYATTRNAMECDEFILTER1>> \
        FROM \
            DOCUMENT DOC \
            <HIGHEST-EVENT-BLOCK-BEGIN> \
            LEFT JOIN ( \
                SELECT \
                    DOC_ID, \
                    MAX(EVENT_TYPE_CDE) HIGHEST_EVENT_TYPE_CDE \
                FROM \
                    DOC_EVENT_REL <<DATEFILTER1>> \
                GROUP BY \
                    DOC_ID \
            ) EVEH ON (DOC.DOC_ID = EVEH.DOC_ID) \
            <HIGHEST-EVENT-BLOCK-END> \
            <LATEST-EVENT-BLOCK-BEGIN> \
            LEFT JOIN ( \
                SELECT \
                    DOC_ID, \
                    MAX(EVENT_DTM) EVENT_DTM \
                FROM \
                    DOC_EVENT_REL \
                GROUP BY \
                	DOC_ID \
            ) EVEL ON (DOC.DOC_ID = EVEL.DOC_ID) \
            LEFT JOIN ( \
            	SELECT \
                    DOC_ID, \
                    EVENT_DTM, \
                    EVENT_TYPE_CDE   LATEST_EVENT_TYPE_CDE \
                FROM DOC_EVENT_REL \
            ) EVEL2 ON (EVEL2.DOC_ID = EVEL.DOC_ID AND EVEL2.EVENT_DTM = EVEL.EVENT_DTM) \
            <LATEST-EVENT-BLOCK-END> \
            LEFT JOIN ( \
                SELECT \
                    ADUR.DOC_ID, \
                    AU.APP_USER_ID, \
                    AU.USER_LOGIN_ID \
                FROM \
                    DOC_APP_USER_REL ADUR \
                    JOIN APP_USER AU ON ADUR.APP_USER_ID = AU.APP_USER_ID \
                WHERE \
                    ADUR.END_DTM IS NULL \
                    AND ADUR.DOC_ROLE_TYPE_CDE = 1 \
            ) APU ON (DOC.DOC_ID = APU.DOC_ID) \
            LEFT JOIN \
					(SELECT ADUR.DOC_ID, \
							AU.APP_USER_ID CASE_REVIEWER_ID, \
							AU.USER_LOGIN_ID CASE_REVIEWER \
						FROM DOC_APP_USER_REL ADUR \
						JOIN APP_USER AU ON ADUR.APP_USER_ID = AU.APP_USER_ID \
						WHERE ADUR.END_DTM IS NULL \
							AND ADUR.DOC_ROLE_TYPE_CDE = 2  \
						)CASE_REVIEW ON (DOC.DOC_ID = CASE_REVIEW.DOC_ID) \
             <<SORTBYATTRNAMECDEFILTER2>> <<DATEFILTER2>> \
            DOC.END_DTM IS NULL \
            <<DOCTABLEFILTER>> \
            AND DOC.TENANT_ID = ? \
    ) DOC_DATA \ 
