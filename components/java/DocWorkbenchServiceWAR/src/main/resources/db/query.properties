getDocAttributes=SELECT DATR.DOC_ID,DATR.DOC_ATTR_REL_ID,ATTR.ATTR_NAME_CDE,ANV.ATTR_NAME_TXT,ATTR.ATTR_VALUE,ATTR.EXTRACT_TYPE_CDE,ATTR.CONFIDENCE_PCT,ATTR.CREATE_BY, ATTR.CREATE_DTM, ATTR.LAST_MOD_BY, ATTR.LAST_MOD_DTM \
		FROM DOC_ATTR_REL DATR,ATTRIBUTE ATTR,ATTRIBUTE_NAME ANV \
		WHERE ATTR.ATTR_NAME_CDE=ANV.ATTR_NAME_CDE AND DATR.DOC_ID=? AND DATR.ATTRIBUTE_ID=ATTR.ATTRIBUTE_ID AND ATTR.END_DTM IS NULL AND DATR.END_DTM IS NULL AND \
		DATR.TENANT_ID=ANV.TENANT_ID AND DATR.TENANT_ID=ATTR.TENANT_ID AND DATR.TENANT_ID = ? ORDER BY DATR.CREATE_DTM
getAttachmentAttributes=SELECT AATR.ATTACHMENT_ID,DAR.DOC_ID,AATR.ATTACHMENT_ATTR_REL_ID,ATTR.ATTR_NAME_CDE,ANV.ATTR_NAME_TXT,ATTR.ATTR_VALUE,ATTR.EXTRACT_TYPE_CDE,ATTR.CONFIDENCE_PCT, ATTR.CREATE_BY, ATTR.CREATE_DTM, ATTR.LAST_MOD_BY, ATTR.LAST_MOD_DTM \
		FROM ATTACHMENT_ATTR_REL AATR,ATTRIBUTE ATTR,ATTRIBUTE_NAME ANV,DOC_ATTACHMENT_REL DAR WHERE DAR.DOC_ID = ? AND AATR.ATTACHMENT_ID = DAR.ATTACHMENT_ID AND \
		ATTR.ATTR_NAME_CDE=ANV.ATTR_NAME_CDE AND AATR.ATTRIBUTE_ID=ATTR.ATTRIBUTE_ID AND ATTR.END_DTM IS NULL AND AATR.END_DTM IS NULL AND AATR.TENANT_ID=ANV.TENANT_ID \
		AND AATR.TENANT_ID=ATTR.TENANT_ID AND AATR.TENANT_ID = ? ORDER BY AATR.CREATE_DTM
getDocAttachAttrList=SELECT \
	dar.doc_id, \
	attr.attr_name_cde, \
	aatr.attachment_attr_rel_id, \
	anv.attr_name_txt, \
	attr.attr_value, \
	etv.extract_type_cde, \
	etv.extract_type_txt, \
	attr.confidence_pct \
FROM \
	 attribute_name anv, \
	 extract_type_val etv, \
	 doc_attachment_rel dar, \
	 attachment_attr_rel aatr, \
	attribute ATTR \
WHERE \
	anv.attr_name_cde = attr.attr_name_cde \
	AND attr.extract_type_cde = etv.extract_type_cde \
	AND attr.end_dtm IS NULL \
	AND aatr.end_dtm IS NULL \
	AND dar.attachment_id = aatr.attachment_id \
	AND aatr.attribute_id = attr.attribute_id \
	AND anv.tenant_id = aatr.tenant_id \
	AND aatr.tenant_id = attr.tenant_id <<DOCFILTER>>\
	AND attr.tenant_id =? <<ATTRFILTER>>	
getValTableData=SELECT * FROM {TABLE_NAME} ORDER BY 1
getActionResult=SELECT ACTION_RESULT FROM DOC_ACTION_REL WHERE DOC_ACTION_REL_ID=? AND TENANT_ID=? AND TASK_STATUS_CDE=400
getActionMapping=SELECT ACTVAL.ACTION_NAME_CDE, ACTVAL.ACTION_NAME_TXT, PARAMVAL.PARAM_NAME_CDE, \
				 PARAMVAL.PARAM_NAME_TXT, \
				 ATTRVAL.ATTR_NAME_CDE, ATTRVAL.ATTR_NAME_TXT ATTRVAL_ATTR_NAME_TXT, APAM.ATTR_NAME_TXT APAM_ATTR_NAME_TXT \
				 FROM ACTION_PARAM_ATTR_MAPPING  APAM \
				 RIGHT OUTER JOIN ACTION_NAME ACTVAL on ACTVAL.ACTION_NAME_CDE = APAM.ACTION_NAME_CDE \
				 LEFT OUTER JOIN ATTRIBUTE_NAME ATTRVAL on ATTRVAL.ATTR_NAME_CDE = APAM.ATTR_NAME_CDE \
				 LEFT OUTER JOIN PARAM_NAME PARAMVAL on PARAMVAL.PARAM_NAME_CDE = APAM.PARAM_NAME_CDE \
				 WHERE (ATTRVAL.TENANT_ID IS NULL OR ATTRVAL.TENANT_ID=ACTVAL.TENANT_ID) AND (PARAMVAL.TENANT_ID IS NULL OR \
				 PARAMVAL.TENANT_ID=ACTVAL.TENANT_ID) AND (APAM.TENANT_ID IS NULL OR APAM.TENANT_ID=ACTVAL.TENANT_ID) AND ACTVAL.TENANT_ID=? \
				 ORDER BY ACTVAL.ACTION_NAME_CDE, PARAMVAL.PARAM_NAME_CDE, ATTRVAL.ATTR_NAME_CDE
